# Deployment Workflow (Dev)
#
# Purpose:
#   Builds and pushes a container image to ECR, then deploys the rendered
#   Kubernetes manifest to the dev namespace.
#
# Triggers:
#   - push: Protected main branch
#   - workflow_dispatch: Manual deployment
#
# Permissions:
#   - contents: read
#   - id-token: write (required for AWS OIDC role assumption)
#
# Environment Model:
#   - This workflow is dev-specific and uses DEV_* secrets.
#   - To add more environments later, copy this file (for example deploy-prod.yml)
#     and replace DEV_* with PROD_* while changing environment/concurrency names.
#
# Required Secrets (dev environment):
#   - DEV_ECR_ROLE_TO_ASSUME
#   - DEV_KUBE_NAMESPACE
#   - DEV_KUBE_CERT
#   - DEV_KUBE_CLUSTER
#   - DEV_KUBE_TOKEN
#
# Required Variables:
#   - ECR_REGION
#   - ECR_REPOSITORY

name: Deploy Dev 🚀
run-name: Deploy Dev 🚀

on:
  push:
    branches:
      - "main"

  workflow_dispatch:

permissions: {}

env:
  environment: dev
  IMAGE_TAG: ${{ github.sha }}

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  setup:
    name: Setup 🔧
    runs-on: ["ubuntu-latest"]
    outputs:
      environment: ${{ env.environment }}
    steps:
      - name: Environment 🧪
        run: echo "Environment set to ${{ env.environment }}"

  deploy-dev:
    permissions:
      contents: read
      id-token: write

    name: Build, push and deploy (dev) 🚀
    runs-on: ["ubuntu-latest"]
    needs: setup
    environment:
      name: ${{ needs.setup.outputs.environment }}
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: 📦 Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ✅ Validate configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.DEV_ECR_ROLE_TO_ASSUME || secrets.ECR_ROLE_TO_ASSUME }}" ]]; then
            echo "Missing required secret: DEV_ECR_ROLE_TO_ASSUME (or ECR_ROLE_TO_ASSUME fallback)"
            exit 1
          fi
          if [[ -z "${{ vars.ECR_REGION }}" ]]; then
            echo "Missing required variable: ECR_REGION"
            exit 1
          fi
          if [[ -z "${{ vars.ECR_REPOSITORY }}" ]]; then
            echo "Missing required variable: ECR_REPOSITORY"
            exit 1
          fi
          if [[ -z "${{ secrets.DEV_KUBE_NAMESPACE || secrets.KUBE_NAMESPACE }}" ]]; then
            echo "Missing required secret: DEV_KUBE_NAMESPACE (or KUBE_NAMESPACE fallback)"
            exit 1
          fi
          if [[ -z "${{ secrets.DEV_KUBE_CLUSTER || secrets.KUBE_CLUSTER }}" ]]; then
            echo "Missing required secret: DEV_KUBE_CLUSTER (or KUBE_CLUSTER fallback)"
            exit 1
          fi
          if [[ -z "${{ secrets.DEV_KUBE_CERT || secrets.KUBE_CERT }}" ]]; then
            echo "Missing required secret: DEV_KUBE_CERT (or KUBE_CERT fallback)"
            exit 1
          fi
          if [[ -z "${{ secrets.DEV_KUBE_TOKEN || secrets.KUBE_TOKEN }}" ]]; then
            echo "Missing required secret: DEV_KUBE_TOKEN (or KUBE_TOKEN fallback)"
            exit 1
          fi

      - name: 🔑 Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.DEV_ECR_ROLE_TO_ASSUME || secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: 🔐 Login
        id: login
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: ⚒️ Build
        shell: bash
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .

      - name: ⬆️ Push
        shell: bash
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          KUBE_NAMESPACE: ${{ secrets.DEV_KUBE_NAMESPACE || secrets.KUBE_NAMESPACE }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          cat kubernetes-deploy.tpl | envsubst > kubernetes-deploy.yaml

      - name: ⚙️ Configure
        shell: bash
        env:
          KUBE_NAMESPACE: ${{ secrets.DEV_KUBE_NAMESPACE || secrets.KUBE_NAMESPACE }}
        run: |
          set -euo pipefail
          echo "${{ secrets.DEV_KUBE_CERT || secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster cp-cluster --certificate-authority=./ca.crt --server=${{ secrets.DEV_KUBE_CLUSTER || secrets.KUBE_CLUSTER }}
          kubectl config set-credentials deploy-user --token=${{ secrets.DEV_KUBE_TOKEN || secrets.KUBE_TOKEN }}
          kubectl config set-context dev --cluster=cp-cluster --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context dev

      - name: ⚡️ Deploy
        shell: bash
        env:
          KUBE_NAMESPACE: ${{ secrets.DEV_KUBE_NAMESPACE || secrets.KUBE_NAMESPACE }}
        run: |
          set -euo pipefail
          kubectl -n ${KUBE_NAMESPACE} apply -f kubernetes-deploy.yaml
          kubectl -n ${KUBE_NAMESPACE} rollout status deploy/reuse-library-web --timeout=180s
