# Security composition analysis for dependencies and Docker images
# Scans for vulnerabilities, uploads SARIF results to GitHub Security tab
# Trigger: schedule (daily), pull_request, push, workflow_dispatch | Permissions: contents:write, security-events:write

name: SCA ⚡️
run-name: Software Composition Analysis ⚡️

on:
  schedule:
    - cron: "0 0 * * *"

  pull_request:
    branches: ["**"]

  workflow_dispatch:
  branch_protection_rule:

permissions: {}

jobs:
  sca:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      actions: read

    name: Execute ⚙️
    runs-on: ["ubuntu-latest"]

    steps:
      - name: Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0

      - name: Install
        shell: bash
        run: npm ci --ignore-scripts

      - name: ⚡️ SCA
        uses: ministryofjustice/devsecops-actions/sca@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Mandatory
          dependency-review-config-file: "./.github/dependency-review-config.yml" # Optional
          dependency-check-suppression-file: "dependency-check-suppression.xml" # Optional
